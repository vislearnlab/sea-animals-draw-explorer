<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sea Animals Explorer · drawings &amp; descriptions in CLIP space</title>
<style>
  :root { --bg:#0b1622; --panel:#10202f; --panel2:#16293b; --line:#23394d; --txt:#e6f0f7; --muted:#8aa3b8; --accent:#33c4d6; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  #app { display:grid; grid-template-columns:318px 1fr; height:100vh; }
  #side { background:var(--panel); border-right:1px solid var(--line); padding:16px; overflow-y:auto; }
  #side h1 { font-size:15px; margin:0 0 2px; }
  #side .sub { color:var(--muted); font-size:11px; margin-bottom:14px; }
  .group { margin-bottom:18px; }
  .group > label.h { display:block; font-weight:600; font-size:11px; letter-spacing:.04em;
    text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  select, button, input[type=search] { background:var(--panel2); color:var(--txt);
    border:1px solid var(--line); border-radius:7px; padding:7px 9px; font:inherit; width:100%; }
  select:focus, input:focus { outline:1px solid var(--accent); }
  /* modality segmented control */
  #modality { display:flex; gap:0; border:1px solid var(--line); border-radius:9px; overflow:hidden; margin-bottom:14px; }
  #modality button { border:none; border-radius:0; background:var(--panel2); padding:9px 4px; cursor:pointer;
    font-weight:600; font-size:12.5px; color:var(--muted); }
  #modality button.on { background:var(--accent); color:#06202a; }
  .rangewrap { display:flex; align-items:center; gap:8px; }
  .rangewrap input[type=range] { flex:1; accent-color:var(--accent); }
  #legend { display:flex; flex-direction:column; gap:4px; }
  #legend .row { display:flex; align-items:center; gap:8px; font-size:12px; text-transform:capitalize; }
  #legend .sw { width:13px; height:13px; border-radius:3px; flex:none; }
  #legend.grad .bar { height:12px; border-radius:4px; flex:1; }
  #legend .gradlabels { display:flex; justify-content:space-between; color:var(--muted); font-size:11px; }
  .stat { color:var(--muted); font-size:11px; margin-top:6px; }
  .btnrow { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { cursor:pointer; width:auto; padding:5px 9px; font-size:11.5px; border-radius:20px; }
  .chip:hover { border-color:var(--accent); }
  #catlist { border:1px solid var(--line); border-radius:8px;
    padding:6px 8px; background:var(--panel2); display:grid; grid-template-columns:1fr 1fr; gap:1px 10px; }
  #catlist label { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer;
    text-transform:capitalize; padding:2px 0; }
  #catlist input { accent-color:var(--accent); margin:0; }
  .toggle { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; padding:6px 0; }
  .toggle input { accent-color:var(--accent); width:auto; }
  #main { position:relative; overflow:hidden; }
  #cv { display:block; width:100%; height:100%; cursor:crosshair; }
  #hint { position:absolute; left:14px; bottom:12px; color:var(--muted); font-size:11px;
    background:rgba(11,22,34,.7); padding:5px 9px; border-radius:7px; pointer-events:none; }
  #card { position:absolute; top:14px; right:14px; width:236px; background:var(--panel);
    border:1px solid var(--line); border-radius:11px; padding:12px; display:none; }
  #card.show { display:block; }
  #card img { width:212px; height:212px; image-rendering:auto; background:#fff; border-radius:8px; display:block; }
  #cardText { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:9px 10px;
    font-size:13px; line-height:1.5; color:#dce8f1; max-height:150px; overflow-y:auto; font-style:italic; }
  #card .cat { font-weight:600; margin:9px 0 2px; font-size:14px; text-transform:capitalize; }
  #card table { width:100%; border-collapse:collapse; margin-top:6px; font-size:12px; }
  #card td { padding:2px 0; }
  #card td.k { color:var(--muted); }
  #card td.v { text-align:right; font-variant-numeric:tabular-nums; }
  #card tr.sec td { color:var(--accent); font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; padding-top:7px; }
  .pill { display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; text-transform:capitalize; }
  .pill.ok { background:#11351f; color:#5ed694; }
  .pill.no { background:#3a1b1b; color:#ff8a8a; }
  .pill.n  { background:#123247; color:#7fd6e6; }
  #close { position:absolute; top:8px; right:10px; cursor:pointer; color:var(--muted); border:none;
    background:none; font-size:18px; width:auto; padding:0; }
  #close:hover { color:var(--txt); }
  a { color:var(--accent); }
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>🐙 Sea Animals Explorer</h1>
    <div class="sub">Children's &amp; adults' <b>drawings</b> and <b>descriptions</b> of six sea animals, laid out by CLIP zero-shot classification. <span id="count"></span></div>

    <div id="modality">
      <button data-mod="drawings" class="on">✏️ Drawings</button>
      <button data-mod="descriptions">💬 Descriptions</button>
    </div>

    <div class="group">
      <label class="h" for="colorby">Color by</label>
      <select id="colorby">
        <optgroup label="Model (CLIP zero-shot)">
          <option value="clip_tp">CLIP recognizability (target prob)</option>
          <option value="clip_correct">CLIP correct / incorrect</option>
          <option value="clip_logodds">CLIP log-odds</option>
          <option value="clip_guess">CLIP guess (category)</option>
        </optgroup>
        <optgroup label="Similarity to adults">
          <option value="recog">Similarity to adult prototype</option>
        </optgroup>
        <optgroup label="Within-subject confusion">
          <option value="conf">Confusion strength (top off-target)</option>
        </optgroup>
        <optgroup label="Other">
          <option value="age">Producer age</option>
          <option value="cat">Target category</option>
        </optgroup>
      </select>
      <div id="legend" class="group" style="margin-top:11px;"></div>
    </div>

    <div class="group">
      <label class="h">Target categories <span id="catCount" style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;"></span></label>
      <div class="btnrow" style="margin-bottom:6px;">
        <button class="chip" data-grp="__all">All</button>
        <button class="chip" data-grp="__none">None</button>
        <span id="groupChips"></span>
      </div>
      <div id="catlist"></div>
    </div>

    <div class="group">
      <label class="h">Producer age range</label>
      <div class="rangewrap">
        <input type="range" id="ageMin" min="3" max="30" value="3" step="1" />
        <input type="range" id="ageMax" min="3" max="30" value="30" step="1" />
      </div>
      <div class="stat" id="ageLabel">ages 3–30</div>
    </div>

    <div class="group">
      <label class="toggle"><input type="checkbox" id="kidsOnly" /> Children only (exclude adults)</label>
      <label class="toggle"><input type="checkbox" id="correctOnly" /> CLIP-correct only</label>
    </div>

    <div class="group"><button id="reset" style="cursor:pointer;">Reset view</button></div>

    <div class="stat" id="visStat"></div>
    <div class="stat" id="layoutNote" style="margin-top:14px;"></div>
  </aside>

  <main id="main">
    <canvas id="cv"></canvas>
    <div id="hint">loading data…</div>
    <div id="card">
      <button id="close">×</button>
      <img id="cardImg" alt="" />
      <div id="cardText" style="display:none;"></div>
      <div class="cat" id="cardCat"></div>
      <table><tbody id="cardTbl"></tbody></table>
    </div>
  </main>
</div>

<script>
const IMG_BASE_FALLBACKS = ["./", "", "../"];
let ALL=null, D=null, MOD="drawings", IMG_BASE="./";
const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const card = document.getElementById("card");
const NODATA = "#33414d";
const RECOG_LO=-0.4, RECOG_HI=0.9;

// ---------- color helpers ----------
function lerp(a,b,t){return a+(b-a)*t;}
const VIRIDIS=[[68,1,84],[59,82,139],[33,145,140],[94,201,98],[253,231,37]];
const MAGMA  =[[13,8,38],[81,18,124],[183,55,121],[252,137,97],[252,253,191]];
function ramp(stops,t){t=Math.max(0,Math.min(1,t));const s=t*(stops.length-1);const i=Math.floor(s),f=s-i;
  const a=stops[i],b=stops[Math.min(i+1,stops.length-1)];
  return `rgb(${Math.round(lerp(a[0],b[0],f))},${Math.round(lerp(a[1],b[1],f))},${Math.round(lerp(a[2],b[2],f))})`;}
function catColor(i,n){return `hsl(${(i*360/n)%360},62%,58%)`;}
function hsl(h,s,l){return `hsl(${h},${s}%,${l}%)`;}

// ---------- view ----------
let scale=1, tx=0, ty=0, fit={s:1,ox:0,oy:0};
function worldToScreen(x,y){return [ (x*fit.s+fit.ox)*scale+tx, (y*fit.s+fit.oy)*scale+ty ];}
function resize(){
  const r=cv.parentElement.getBoundingClientRect(), dpr=window.devicePixelRatio||1;
  cv.width=r.width*dpr; cv.height=r.height*dpr; cv.style.width=r.width+"px"; cv.style.height=r.height+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0); computeFit(r.width,r.height); draw();
}
function computeFit(w,h){ const pad=40, s=Math.min((w-2*pad)/1000,(h-2*pad)/1000);
  fit.s=s; fit.ox=(w-1000*s)/2; fit.oy=(h-1000*s)/2; }

// ---------- filters ----------
const F = { cats:new Set(), ageMin:3, ageMax:30, kidsOnly:false, correctOnly:false };
function catSelected(i){ return F.cats.size===0 || F.cats.has(D.cat[i]); }
function passes(i){
  if(!catSelected(i)) return false;
  const a=D.age[i]; if(a<F.ageMin||a>F.ageMax) return false;
  if(F.kidsOnly && D.is_adult[i]) return false;
  if(F.correctOnly && !D.clip_correct[i]) return false;
  return true;
}

// ---------- color mode ----------
let colorMode="clip_tp";
const NULLABLE = {recog:1, conf:1};
function colorOf(i){
  switch(colorMode){
    case "clip_tp":     return ramp(VIRIDIS, D.clip_tp[i]);
    case "clip_correct":return D.clip_correct[i] ? "#5ed694" : "#ff6b6b";
    case "clip_logodds":return ramp(VIRIDIS, (D.clip_logodds[i]+10)/16);
    case "clip_guess":  return catColor(D.clip_guess[i], D.categories.length);
    case "recog":       { const v=D.recog[i]; return v==null?null:ramp(VIRIDIS,(v-RECOG_LO)/(RECOG_HI-RECOG_LO)); }
    case "conf":        { const v=D.conf[i];  return v==null?null:ramp(MAGMA,(v-0.2)/0.6); }
    case "age":         return hsl(lerp(220,12,(Math.min(D.age[i],12)-3)/9),70,58);
    case "cat":         return catColor(D.cat[i], D.categories.length);
  }
}

// ---------- draw ----------
let hoverIdx=-1, pinIdx=-1;
function draw(){
  const w=cv.clientWidth,h=cv.clientHeight; ctx.clearRect(0,0,w,h);
  const r = Math.max(1.3, Math.min(4.4, 1.25*scale));
  const nullable = NULLABLE[colorMode];
  if(nullable){
    ctx.globalAlpha=0.16; ctx.fillStyle=NODATA;
    for(let i=0;i<D.n;i++){ if(!passes(i) || D[colorMode][i]!=null) continue;
      const [sx,sy]=worldToScreen(D.x[i],D.y[i]); if(sx<-4||sy<-4||sx>w+4||sy>h+4) continue;
      ctx.beginPath(); ctx.arc(sx,sy,r,0,6.283); ctx.fill(); }
  }
  ctx.globalAlpha=0.85;
  for(let i=0;i<D.n;i++){ if(!passes(i)) continue;
    const col=colorOf(i); if(col===null) continue;
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]); if(sx<-4||sy<-4||sx>w+4||sy>h+4) continue;
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(sx,sy,nullable?r+0.6:r,0,6.283); ctx.fill(); }
  ctx.globalAlpha=1;
  for(const [idx,col,rad] of [[pinIdx,"#fff",6],[hoverIdx,"#fff",5]]){
    if(idx<0||!passes(idx)) continue;
    const [sx,sy]=worldToScreen(D.x[idx],D.y[idx]);
    ctx.beginPath(); ctx.arc(sx,sy,rad,0,6.283); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
    const c=colorOf(idx); ctx.beginPath(); ctx.arc(sx,sy,rad-2,0,6.283); ctx.fillStyle=c||NODATA; ctx.fill(); }
}
function nearest(px,py){ let best=-1, bd=14*14;
  for(let i=0;i<D.n;i++){ if(!passes(i)) continue;
    const [sx,sy]=worldToScreen(D.x[i],D.y[i]); const dx=sx-px,dy=sy-py,d=dx*dx+dy*dy;
    if(d<bd){bd=d;best=i;} } return best; }

// ---------- detail card ----------
function fmt(v,d=2){ return (v==null||isNaN(v)) ? "—" : (+v).toFixed(d); }
function showCard(i){
  if(i<0) return; card.classList.add("show");
  const img=document.getElementById("cardImg"), txt=document.getElementById("cardText");
  if(MOD==="drawings"){ img.style.display="block"; txt.style.display="none";
    img.src = IMG_BASE + ALL.draw_dir + "/" + D.file[i];
  } else { img.style.display="none"; txt.style.display="block"; txt.textContent = "“"+D.text[i]+"”"; }
  const who = D.is_adult[i] ? "adult" : ("age " + D.age[i]);
  document.getElementById("cardCat").textContent = D.categories[D.cat[i]] + " · " + who;
  const guess=D.categories[D.clip_guess[i]], ok=D.clip_correct[i];
  const recog = D.recog[i]==null
    ? `<tr><td class="k" colspan="2">adult — defines the prototype</td></tr>`
    : `<tr><td class="k">cosine to adult</td><td class="v">${fmt(D.recog[i],3)}</td></tr>`;
  const conf = D.conf_with[i]==null
    ? `<tr><td class="k" colspan="2">${MOD==='drawings'?'drew':'described'} only this category</td></tr>`
    : `<tr><td class="k">most like their</td><td class="v"><span class="pill n">${D.categories[D.conf_with[i]]}</span></td></tr>
       <tr><td class="k">confusion prob</td><td class="v">${fmt(D.conf[i],2)}</td></tr>`;
  const tail = MOD==="drawings"
    ? `<tr class="sec"><td colspan="2">Drawing</td></tr>
       <tr><td class="k"># strokes</td><td class="v">${D.strokes[i]==null?'—':D.strokes[i]}</td></tr>
       <tr><td class="k">draw time (s)</td><td class="v">${fmt(D.duration[i],1)}</td></tr>
       <tr><td class="k">ink (mean intensity)</td><td class="v">${fmt(D.intensity[i],3)}</td></tr>`
    : `<tr class="sec"><td colspan="2">Description</td></tr>
       <tr><td class="k"># words</td><td class="v">${D.nwords[i]}</td></tr>`;
  document.getElementById("cardTbl").innerHTML = `
    <tr class="sec"><td colspan="2">Model (CLIP zero-shot)</td></tr>
    <tr><td class="k">CLIP guess</td><td class="v">${guess} <span class="pill ${ok?'ok':'no'}">${ok?'correct':'wrong'}</span></td></tr>
    <tr><td class="k">target prob</td><td class="v">${fmt(D.clip_tp[i],3)}</td></tr>
    <tr><td class="k">log-odds</td><td class="v">${fmt(D.clip_logodds[i],2)}</td></tr>
    <tr class="sec"><td colspan="2">Similarity to adults</td></tr>
    ${recog}
    <tr class="sec"><td colspan="2">Within-subject confusion</td></tr>
    ${conf}
    ${tail}`;
}
document.getElementById("close").onclick=()=>{card.classList.remove("show");pinIdx=-1;draw();};

// ---------- legend ----------
function buildLegend(){
  const el=document.getElementById("legend");
  const grad=(stops,lo,hi,noData)=>{ el.className="group grad";
    el.innerHTML=`<div class="bar" style="background:linear-gradient(90deg,${stops})"></div>
      <div class="gradlabels"><span>${lo}</span><span>${hi}</span></div>
      ${noData?`<div class="row" style="margin-top:6px;"><span class="sw" style="background:${NODATA};opacity:.5"></span>adults (define prototype)</div>`:''}`; };
  const V=VIRIDIS.map(c=>`rgb(${c})`).join(","), M=MAGMA.map(c=>`rgb(${c})`).join(",");
  if(colorMode==="clip_correct"){ el.className="group";
    el.innerHTML=`<div class="row"><span class="sw" style="background:#5ed694"></span>CLIP correct</div>
                  <div class="row"><span class="sw" style="background:#ff6b6b"></span>CLIP wrong</div>`;
  } else if(colorMode==="cat" || colorMode==="clip_guess"){ el.className="group";
    el.innerHTML = D.categories.map((c,i)=>`<div class="row"><span class="sw" style="background:${catColor(i,D.categories.length)}"></span>${c}</div>`).join("")
      + (colorMode==="clip_guess"?`<div class="stat">hue = the category CLIP guessed</div>`:``);
  } else if(colorMode==="clip_tp"){ grad(V,"0 (unrecognizable)","1 (clear)",false);
  } else if(colorMode==="clip_logodds"){ grad(V,"low","high",false);
  } else if(colorMode==="recog"){ grad(V,"low (–0.4)","high (0.9)",true);
  } else if(colorMode==="conf"){ grad(M,"distinct","confusable",false);
  } else if(colorMode==="age"){ grad(`${hsl(220,70,58)},${hsl(116,70,58)},${hsl(12,70,58)}`,"age 3","age 12+",false); }
}

// ---------- visible stat ----------
function updateStat(){
  let n=0, corr=0, tp=0, kids=0;
  for(let i=0;i<D.n;i++){ if(!passes(i))continue; n++; corr+=D.clip_correct[i]; tp+=D.clip_tp[i]; if(!D.is_adult[i])kids++; }
  const noun = MOD==="drawings" ? "drawings" : "descriptions";
  document.getElementById("visStat").textContent =
    `${n.toLocaleString()} ${noun} · ${kids} children / ${n-kids} adults · ${n?Math.round(100*corr/n):0}% CLIP-correct · mean target prob ${n?(tp/n).toFixed(2):'—'}`;
}

// ---------- interactions ----------
let dragging=false, moved=false, lastX=0, lastY=0;
cv.addEventListener("mousedown",e=>{dragging=true;moved=false;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener("mouseup",()=>{dragging=false;});
cv.addEventListener("mousemove",e=>{
  const rect=cv.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  if(dragging){ const dx=e.clientX-lastX, dy=e.clientY-lastY; if(Math.abs(dx)+Math.abs(dy)>2) moved=true;
    tx+=dx; ty+=dy; lastX=e.clientX; lastY=e.clientY; draw(); return; }
  const hh=nearest(px,py);
  if(hh!==hoverIdx){ hoverIdx=hh; draw(); if(hh>=0 && pinIdx<0) showCard(hh); else if(hh<0 && pinIdx<0) card.classList.remove("show"); }
});
cv.addEventListener("click",e=>{ if(moved) return;
  const rect=cv.getBoundingClientRect(); const hh=nearest(e.clientX-rect.left, e.clientY-rect.top);
  if(hh>=0){ pinIdx=hh; showCard(hh); draw(); } });
cv.addEventListener("wheel",e=>{ e.preventDefault();
  const rect=cv.getBoundingClientRect(), px=e.clientX-rect.left, py=e.clientY-rect.top;
  const f=Math.exp(-e.deltaY*0.0015); tx=px-(px-tx)*f; ty=py-(py-ty)*f; scale*=f;
  scale=Math.max(0.4,Math.min(60,scale)); draw(); },{passive:false});

// ---------- category checklist ----------
function refreshCatUI(){
  document.querySelectorAll("#catlist input").forEach(cb=>{ cb.checked = F.cats.has(+cb.value); });
  const sel=F.cats.size;
  document.getElementById("catCount").textContent = `(${sel===0?'none':sel===D.categories.length?'all':sel} selected)`;
}
function buildCatList(){
  const list=document.getElementById("catlist"); list.innerHTML="";
  D.categories.forEach((c,i)=>{
    const lab=document.createElement("label");
    lab.innerHTML=`<input type="checkbox" value="${i}" checked> ${c}`;
    lab.querySelector("input").onchange=e=>{ if(e.target.checked) F.cats.add(i); else F.cats.delete(i);
      refreshCatUI(); draw(); updateStat(); };
    list.appendChild(lab);
  });
  const chips=document.getElementById("groupChips"); chips.innerHTML="";
  Object.keys(ALL.groups||{}).forEach(label=>{ const b=document.createElement("button");
    b.className="chip"; b.textContent=label; b.dataset.grp=label; chips.appendChild(b); });
  document.querySelectorAll(".chip").forEach(b=>{ b.onclick=()=>{ const g=b.dataset.grp;
    if(g==="__all") D.categories.forEach((_,i)=>F.cats.add(i));
    else if(g==="__none") F.cats.clear();
    else { F.cats.clear(); ALL.groups[g].forEach(i=>F.cats.add(i)); }
    refreshCatUI(); draw(); updateStat(); }; });
}

// ---------- controls ----------
document.getElementById("colorby").onchange=e=>{colorMode=e.target.value;buildLegend();draw();updateStat();};
function syncAge(){ let lo=+ageMin.value, hi=+ageMax.value; if(lo>hi){[lo,hi]=[hi,lo];}
  F.ageMin=lo;F.ageMax=hi;
  document.getElementById("ageLabel").textContent = lo===hi?`age ${lo}`:`ages ${lo}–${hi}${hi>=30?'+':''}`;
  draw();updateStat(); }
const ageMin=document.getElementById("ageMin"), ageMax=document.getElementById("ageMax");
ageMin.oninput=syncAge; ageMax.oninput=syncAge;
document.getElementById("kidsOnly").onchange=e=>{F.kidsOnly=e.target.checked;draw();updateStat();};
document.getElementById("correctOnly").onchange=e=>{F.correctOnly=e.target.checked;draw();updateStat();};
document.getElementById("reset").onclick=()=>{scale=1;tx=0;ty=0;resize();};
window.addEventListener("resize",resize);

// ---------- modality switch ----------
function setModality(mod){
  MOD=mod; D=Object.assign({}, ALL[mod], {categories:ALL.categories});
  document.querySelectorAll("#modality button").forEach(b=>b.classList.toggle("on", b.dataset.mod===mod));
  F.cats.clear(); D.categories.forEach((_,i)=>F.cats.add(i));
  hoverIdx=-1; pinIdx=-1; card.classList.remove("show");
  buildCatList(); refreshCatUI();
  const kids=D.is_adult.filter(v=>!v).length, uk=new Set();
  document.getElementById("layoutNote").textContent =
    `Layout: t-SNE of the 6-way CLIP (ViT-B-32) zero-shot probability vector for each ${mod==='drawings'?'drawing':'description'}. Drag to pan · scroll to zoom · hover for the ${mod==='drawings'?'drawing':'text'} · click to pin.`;
  document.getElementById("count").textContent=`${D.n.toLocaleString()} ${mod} · ${kids} children + ${D.n-kids} adults.`;
  scale=1;tx=0;ty=0; buildLegend(); resize(); updateStat();
}
document.querySelectorAll("#modality button").forEach(b=>b.onclick=()=>setModality(b.dataset.mod));

// ---------- load ----------
async function load(){
  ALL=await (await fetch("points.json")).json();
  await probeBase();
  setModality("drawings");
  document.getElementById("hint").textContent="drag to pan · scroll to zoom · hover for the drawing";
}
function probeBase(){
  return new Promise(resolve=>{ let k=0; const f0=ALL.drawings.file[0];
    const test=()=>{ if(k>=IMG_BASE_FALLBACKS.length){resolve();return;}
      const im=new Image(); im.onload=()=>{IMG_BASE=IMG_BASE_FALLBACKS[k];resolve();};
      im.onerror=()=>{k++;test();}; im.src=IMG_BASE_FALLBACKS[k]+ALL.draw_dir+"/"+f0; };
    test(); });
}
load();
</script>
